name: BC Tests

# Tiny consumer workflow that delegates to a reusable workflow hosted in
# StefanMaron/MsDyn365Bc.On.Linux. Copy this file into your repo at
# .github/workflows/bc-test.yml, edit the `with:` block, commit, push.
#
# Two flavours are available, pick whichever fits:
#   * bc-test-from-source.yml — compiles AL source from your repo
#   * bc-test-prebuilt.yml    — publishes existing .app files
#
# This example uses the from-source flavour. For the prebuilt flavour,
# replace the `uses:` line and the `with:` keys with the prebuilt set
# (test_app_files / app_files instead of test_app_dirs / app_dirs).

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  bc-tests:
    uses: StefanMaron/MsDyn365Bc.On.Linux/.github/workflows/bc-test-from-source.yml@master
    with:
      bc_version:     "27.5"
      bc_country:     "w1"
      app_dirs:       "app"          # space-separated dirs containing app.json
      test_app_dirs:  "test"         # ditto for test apps
      # codeunit_range accepts:
      #   "50000..99999"                  single AL range
      #   "50000..50100|130450..130459"   multiple ranges (pipe-separated)
      #   "50000,50001,50002"             explicit ids
      codeunit_range: "50000..99999"

    # Optional: ISV / developer license. Without this, BC boots with the
    # public Cronus license (which is fine for most test scenarios). If
    # you need your own license, base64-encode it and store as a repo
    # secret named BC_LICENSE:
    #
    #   base64 -w0 < your-license.bclicense | gh secret set BC_LICENSE
    #
    # Then uncomment the secrets block below. The reusable workflow
    # imports the license BEFORE NST starts, so no boot/import/restart
    # cycle is needed.
    #
    # secrets:
    #   bc_license: ${{ secrets.BC_LICENSE }}

  # ─── Prebuilt flavour example (commented out) ─────────────────────────
  #
  # bc-tests-prebuilt:
  #   uses: StefanMaron/MsDyn365Bc.On.Linux/.github/workflows/bc-test-prebuilt.yml@master
  #   with:
  #     bc_version:     "27.5"
  #     test_app_files: "tests/MyTests.app"
  #     # See above for the accepted codeunit_range formats.
  #     codeunit_range: "50000..99999"
  #   # Same optional license pattern as above:
  #   # secrets:
  #   #   bc_license: ${{ secrets.BC_LICENSE }}
