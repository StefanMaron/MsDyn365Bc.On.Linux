# Azure DevOps pipeline for running AL tests on a Business Central NST
# running on Linux. SKIPS COMPILATION — picks up .app files that already
# live in your repo (or were produced by an upstream build job) and
# publishes them to BC.
#
# Powered by StefanMaron/MsDyn365Bc.On.Linux — runs unmodified Microsoft BC
# on Linux via runtime patching of the Windows .NET service tier.
# Image: ghcr.io/stefanmaron/msdyn365bc.on.linux/bc-runner:latest (public).
#
# Use this variant when:
#   - You build .app files in a separate pipeline / build server
#   - You commit pre-compiled .app files to the repo
#   - Your AL is built by a tool that doesn't fit in this pipeline
#
# ──────────────────────────────────────────────────────────────────────
# HOW TO USE
# ──────────────────────────────────────────────────────────────────────
# 1. Copy this file into your repo as azure-pipelines.yml.
# 2. Edit the values in the "variables:" block to match your repo:
#      - BC_VERSION / BC_COUNTRY     → which BC version to test against
#      - APP_FILES                   → space-separated list of .app
#                                      paths for production apps
#                                      (publish first, may be empty)
#      - TEST_APP_FILES              → space-separated list of .app
#                                      paths for test apps
#      - CODEUNIT_RANGE              → ID range of your TEST codeunits to
#                                      execute. APP_FILES are published
#                                      but their codeunits aren't run.
# 3. Save + run.
# ──────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include: [main, master]

pr:
  branches:
    include: [main, master]

pool:
  vmImage: 'ubuntu-latest'

variables:
  # ----- Edit these for your project ----------------------------------
  BC_VERSION: '27.5'
  BC_COUNTRY: 'w1'
  BC_TYPE: 'sandbox'

  # Production .app files to publish first (may be empty).
  APP_FILES: ''

  # Test .app files to publish and run.
  TEST_APP_FILES: 'tests/MyTests.app'

  # IDs of your TEST codeunits to execute. APP_FILES are published but
  # their codeunits aren't run — only TEST_APP_FILES codeunits are executed.
  #
  # Accepted formats:
  #   '50000..99999'                       single AL range
  #   '50000..50100|130450..130459'        multiple ranges (pipe-separated)
  #   '50000,50001,50002'                  explicit ids
  #   '50000..50100,130450,200000..210000' mixed
  CODEUNIT_RANGE: '50000..99999'

  # --------------------------------------------------------------------

  # bc-linux runtime image (publicly available on GHCR — no auth needed).
  BC_RUNNER_IMAGE: 'ghcr.io/stefanmaron/msdyn365bc.on.linux/bc-runner:latest'

  # Git ref of MsDyn365Bc.On.Linux to use for scripts.
  BC_LINUX_REF: 'master'

steps:
  - checkout: self
    path: project

  - bash: |
      set -e
      git clone --depth 1 --branch "$(BC_LINUX_REF)" \
        https://github.com/StefanMaron/MsDyn365Bc.On.Linux.git \
        "$(Agent.BuildDirectory)/bc-linux"
    displayName: 'Clone MsDyn365Bc.On.Linux'

  - bash: bash "$(Agent.BuildDirectory)/bc-linux/scripts/workflow-summary.sh" init
    displayName: 'Initialize timing'

  - bash: |
      set -e
      bash "$(Agent.BuildDirectory)/bc-linux/scripts/workflow-summary.sh" begin DOWNLOAD "Download BC artifacts + pull docker images"
      mkdir -p "$(Pipeline.Workspace)/artifact-cache/$(BC_VERSION)"
      (
        "$(Agent.BuildDirectory)/bc-linux/scripts/download-artifacts.sh" \
          "$(BC_TYPE)" "$(BC_VERSION)" "$(BC_COUNTRY)" \
          "$(Pipeline.Workspace)/artifact-cache/$(BC_VERSION)"
      ) &
      ARTIFACT_PID=$!
      (
        cd "$(Agent.BuildDirectory)/bc-linux"
        for attempt in 1 2 3 4 5; do
          if docker compose pull --quiet; then break; fi
          echo "docker compose pull failed (attempt $attempt/5); retrying in 15s..."
          sleep 15
        done
      ) &
      PULL_PID=$!
      wait $ARTIFACT_PID || { echo "artifact download failed"; exit 1; }
      wait $PULL_PID     || { echo "docker pull failed"; exit 1; }
      bash "$(Agent.BuildDirectory)/bc-linux/scripts/workflow-summary.sh" end DOWNLOAD
    displayName: 'Download BC artifacts + pull docker images (parallel)'

  - bash: |
      set -e
      bash "$(Agent.BuildDirectory)/bc-linux/scripts/workflow-summary.sh" begin RESOLVE "Resolve apps to keep"
      ARGS=""
      cd "$(Pipeline.Workspace)/project"
      for f in $(APP_FILES) $(TEST_APP_FILES); do
        [ -z "$f" ] && continue
        [ -f "$f" ] && ARGS="$ARGS --app-file $f"
      done
      KEEP_IDS=$(python3 "$(Agent.BuildDirectory)/bc-linux/scripts/resolve-keep-app-ids.py" \
        $ARGS \
        --artifact-dir "$(Pipeline.Workspace)/artifact-cache/$(BC_VERSION)")
      echo "Resolved keep set: $KEEP_IDS"
      echo "##vso[task.setvariable variable=BC_CLEAR_ALL_APPS]selective"
      echo "##vso[task.setvariable variable=BC_KEEP_APP_IDS]$KEEP_IDS"
      bash "$(Agent.BuildDirectory)/bc-linux/scripts/workflow-summary.sh" end RESOLVE
    displayName: 'Resolve apps to keep in BC database'

  # Optional: stage an ISV/developer license. Without this step BC boots
  # with the public Cronus license. To use your own license, store its
  # base64-encoded content in the variable group as BC_LICENSE_B64 and
  # mark it as a secret. The entrypoint imports the license BEFORE NST
  # starts, so no boot/import/restart cycle is needed. No-op when unset.
  - bash: |
      set -e
      if [ -z "${BC_LICENSE_B64:-}" ]; then
        echo "BC_LICENSE_B64 not set; skipping (default Cronus license will be used)"
        exit 0
      fi
      LICENSE_PATH="$(Agent.TempDirectory)/bc-license.bclicense"
      printf '%s' "$BC_LICENSE_B64" | base64 -d > "$LICENSE_PATH"
      [ -s "$LICENSE_PATH" ] || { echo "ERROR: BC_LICENSE_B64 decoded to an empty file"; exit 1; }
      chmod 644 "$LICENSE_PATH"
      echo "##vso[task.setvariable variable=BC_LICENSE_HOST_PATH]$LICENSE_PATH"
      echo "##vso[task.setvariable variable=BC_LICENSE_FILE]/bc/custom-license.bclicense"
    env:
      BC_LICENSE_B64: $(BC_LICENSE_B64)
    displayName: 'Stage ISV license (if BC_LICENSE_B64 is set)'

  - bash: |
      set -e
      bash "$(Agent.BuildDirectory)/bc-linux/scripts/workflow-summary.sh" begin BC_BOOT "BC startup (background → wait for healthy)"
      cd "$(Agent.BuildDirectory)/bc-linux"
      export BC_ARTIFACTS_DIR="$(Pipeline.Workspace)/artifact-cache/$(BC_VERSION)"
      export BC_VERSION="$(BC_VERSION)"
      export BC_COUNTRY="$(BC_COUNTRY)"
      export BC_TYPE="$(BC_TYPE)"
      export BC_RUNNER_IMAGE="$(BC_RUNNER_IMAGE)"
      export BC_CLEAR_ALL_APPS="$(BC_CLEAR_ALL_APPS)"
      export BC_KEEP_APP_IDS="$(BC_KEEP_APP_IDS)"
      # ISV license overrides (set by the previous step when BC_LICENSE_B64
      # is provided as a secret variable). Empty/unset = default Cronus.
      export BC_LICENSE_HOST_PATH="${BC_LICENSE_HOST_PATH:-}"
      export BC_LICENSE_FILE="${BC_LICENSE_FILE:-}"
      docker compose up -d
      echo "BC container started in background — continuing with other work."
    displayName: 'Start BC on Linux (background)'

  - bash: |
      set -e
      cd "$(Agent.BuildDirectory)/bc-linux"
      for i in $(seq 1 360); do
        STATUS=$(docker inspect --format='{{.State.Health.Status}}' \
          "$(docker compose ps -q bc)" 2>/dev/null || echo unknown)
        case "$STATUS" in
          healthy)   echo "BC ready after $((i*5))s"; break ;;
          unhealthy) docker compose logs bc | tail -80; exit 1 ;;
        esac
        sleep 5
      done
      [ "$STATUS" = "healthy" ] || { docker compose logs bc | tail -100; exit 1; }
      bash "$(Agent.BuildDirectory)/bc-linux/scripts/workflow-summary.sh" end BC_BOOT
    displayName: 'Wait for BC healthy'

  - bash: |
      set -e
      bash "$(Agent.BuildDirectory)/bc-linux/scripts/workflow-summary.sh" begin PUBLISH "Publish .app files"
      AUTH="BCRUNNER:Admin123!"
      DEV="http://localhost:7049"
      publish_app() {
        local app="$1"
        [ -f "$app" ] || { echo "missing: $app"; exit 1; }
        echo ">>> Publishing $app"
        local code
        code=$(curl -s -o /tmp/pub.out -w "%{http_code}" --max-time 180 \
          -u "$AUTH" -X POST \
          -F "file=@${app};type=application/octet-stream" \
          "$DEV/apps?SchemaUpdateMode=forcesync")
        cat /tmp/pub.out; echo
        [ "$code" = "200" ] || [ "$code" = "422" ] || { echo "publish failed: $code"; exit 1; }
      }
      cd "$(Pipeline.Workspace)/project"
      PUBLISHED_COUNT=0
      for app in $(APP_FILES); do
        [ -z "$app" ] && continue
        publish_app "$app"
        PUBLISHED_COUNT=$((PUBLISHED_COUNT + 1))
      done
      for app in $(TEST_APP_FILES); do
        [ -z "$app" ] && continue
        publish_app "$app"
        PUBLISHED_COUNT=$((PUBLISHED_COUNT + 1))
      done
      bash "$(Agent.BuildDirectory)/bc-linux/scripts/workflow-summary.sh" count apps_published "$PUBLISHED_COUNT"
      bash "$(Agent.BuildDirectory)/bc-linux/scripts/workflow-summary.sh" end PUBLISH
    displayName: 'Publish .app files to BC'

  - bash: |
      set -e
      bash "$(Agent.BuildDirectory)/bc-linux/scripts/workflow-summary.sh" begin TESTS "Run AL tests"
      cd "$(Agent.BuildDirectory)/bc-linux"
      TESTS_TOTAL=0; TESTS_PASSED=0; TESTS_FAILED=0; CODEUNITS_TOTAL=0
      for app in $(TEST_APP_FILES); do
        [ -z "$app" ] && continue
        base=$(basename "$app")
        echo "=== Running tests in $base ==="
        tmplog=$(mktemp)
        ./scripts/run-tests.sh \
          --app "$(Pipeline.Workspace)/project/$app" \
          --codeunit-range "$(CODEUNIT_RANGE)" \
          --timeout 30 2>&1 | tee "$tmplog"
        line=$(grep -oE '[0-9]+ total, [0-9]+ passed, [0-9]+ failed' "$tmplog" | tail -1 || true)
        if [ -n "$line" ]; then
          t=$(echo "$line" | grep -oE '^[0-9]+')
          p=$(echo "$line" | grep -oE '[0-9]+ passed' | grep -oE '[0-9]+')
          f=$(echo "$line" | grep -oE '[0-9]+ failed' | grep -oE '[0-9]+')
          TESTS_TOTAL=$((TESTS_TOTAL + ${t:-0}))
          TESTS_PASSED=$((TESTS_PASSED + ${p:-0}))
          TESTS_FAILED=$((TESTS_FAILED + ${f:-0}))
        fi
        cu=$(grep -oE 'Test codeunits: [^ ]+' "$tmplog" | head -1 | sed 's/Test codeunits: //')
        if [ -n "$cu" ]; then
          n=$(echo "$cu" | tr ',' '\n' | grep -c .)
          CODEUNITS_TOTAL=$((CODEUNITS_TOTAL + n))
        fi
        rm -f "$tmplog"
      done
      bash "$(Agent.BuildDirectory)/bc-linux/scripts/workflow-summary.sh" count tests_total    "$TESTS_TOTAL"
      bash "$(Agent.BuildDirectory)/bc-linux/scripts/workflow-summary.sh" count tests_passed   "$TESTS_PASSED"
      bash "$(Agent.BuildDirectory)/bc-linux/scripts/workflow-summary.sh" count tests_failed   "$TESTS_FAILED"
      bash "$(Agent.BuildDirectory)/bc-linux/scripts/workflow-summary.sh" count codeunits_total "$CODEUNITS_TOTAL"
      bash "$(Agent.BuildDirectory)/bc-linux/scripts/workflow-summary.sh" end TESTS
    displayName: 'Run AL tests'

  - bash: |
      JOB_STATUS=success
      [ "$AGENT_JOBSTATUS" = "Failed" ] || [ "$AGENT_JOBSTATUS" = "SucceededWithIssues" ] && JOB_STATUS=failure
      [ "$AGENT_JOBSTATUS" = "Cancelled" ] && JOB_STATUS=cancelled
      export JOB_STATUS
      export BC_TELEMETRY_OPT_OUT="${BC_TELEMETRY_OPT_OUT:-false}"
      bash "$(Agent.BuildDirectory)/bc-linux/scripts/workflow-summary.sh" emit
    displayName: 'Workflow timing summary + telemetry'
    condition: always()

  - bash: |
      cd "$(Agent.BuildDirectory)/bc-linux"
      docker compose logs bc | tail -200
    displayName: 'BC logs (on failure)'
    condition: failed()
