services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD:-Passw0rd123!}
      MSSQL_MEMORY_LIMIT_MB: ${MSSQL_MEMORY_LIMIT_MB:-2048}
    ports:
      - "${SQL_PORT:-11433}:1433"
    tmpfs:
      - /var/opt/mssql/data:size=4g
    volumes:
      - ${BC_ARTIFACTS_DIR:-bc-artifacts}:/bc/artifacts:ro
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${SA_PASSWORD:-Passw0rd123!}' -C -No -Q "SELECT 1" || exit 1
      interval: 10s
      retries: 10
      start_period: 20s

  bc:
    image: ${BC_RUNNER_IMAGE:-bc-runner:local}
    build:
      context: .
      dockerfile: src/Dockerfile
    stdin_open: true
    depends_on:
      sql:
        condition: service_healthy
    ports:
      - "${BC_DEV_PORT:-7049}:7049"
      - "${BC_ODATA_PORT:-7048}:7048"
      - "${BC_API_PORT:-7052}:7052"
      - "${BC_MGMT_PORT:-7045}:7045"
      - "${BC_CLIENT_PORT:-7085}:7085"
    environment:
      BC_VERSION: ${BC_VERSION:-27.5}
      BC_COUNTRY: ${BC_COUNTRY:-w1}
      BC_TYPE: ${BC_TYPE:-sandbox}
      SA_PASSWORD: ${SA_PASSWORD:-Passw0rd123!}
      BC_CLEAR_ALL_APPS: ${BC_CLEAR_ALL_APPS:-false}
      BC_SKIP_APP_PUBLISH: ${BC_SKIP_APP_PUBLISH:-false}
      BC_KEEP_APP_IDS: ${BC_KEEP_APP_IDS:-}
      # Diagnostic only — comma-separated patch IDs to skip (e.g. "14,15,15a,15b,checkfile").
      # Used to bisect Cecil patches that may cause AL→C# emission drift. Empty = production.
      BC_DISABLE_PATCHES: ${BC_DISABLE_PATCHES:-}
      BC_ARTIFACT_URL: ${BC_ARTIFACT_URL:-}
      BC_TEST_APPS: ${BC_TEST_APPS:-}
      SQL_SERVER: sql
      # .NET runtime tuning (Server GC breaks API — do NOT enable gcServer)
      DOTNET_TieredCompilation: ${DOTNET_TieredCompilation:-}
      DOTNET_TC_QuickJitForLoops: ${DOTNET_TC_QuickJitForLoops:-}
    volumes:
      - ${BC_ARTIFACTS_DIR:-bc-artifacts}:/bc/artifacts
      - bc-service:/bc/service
    healthcheck:
      test: test -f /tmp/bc-ready && curl -sf -o /dev/null -u BCRUNNER:Admin123! http://localhost:7048/BC/ODataV4/Company || exit 1
      # 5s interval (was 15s) so wait-for-bc-healthy.sh sees the transition within ~5s
      # of the entrypoint touching /tmp/bc-ready. Saves ~10-15s of slack on every cold
      # boot. The OData /Company probe is cheap; running it every 5s instead of every
      # 15s during the start_period grace window adds negligible NST load.
      interval: 5s
      retries: 360            # 5s × 360 = 30 min after start_period (was 15s × 120)
      start_period: 60s
      timeout: 5s             # was 10s; the probe is cheap, fail fast

volumes:
  bc-artifacts:
  bc-service:
