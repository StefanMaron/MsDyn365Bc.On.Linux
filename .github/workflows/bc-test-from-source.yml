name: BC test (from source) [reusable]

# Reusable workflow that compiles AL source from the calling repo, publishes
# it to a Business Central NST running on Linux, and executes the AL tests.
#
# Consumer usage (paste into .github/workflows/bc-test.yml in your repo):
#
#   name: BC Tests
#   on: [push, pull_request, workflow_dispatch]
#   jobs:
#     test:
#       uses: StefanMaron/MsDyn365Bc.On.Linux/.github/workflows/bc-test-from-source.yml@master
#       with:
#         bc_version:     "27.5"
#         app_dirs:       "app"
#         test_app_dirs:  "test"
#         codeunit_range: "50000..99999"
#
# Inputs are documented under workflow_call below. For pre-built .app files
# (no compile step), use bc-test-prebuilt.yml instead.

on:
  workflow_call:
    inputs:
      bc_version:
        description: "BC platform version (e.g. 27.5)"
        required: false
        type: string
        default: "27.5"
      bc_country:
        description: "BC country code (e.g. w1, de, us)"
        required: false
        type: string
        default: "w1"
      bc_type:
        description: "BC artifact type (sandbox or onprem)"
        required: false
        type: string
        default: "sandbox"
      app_dirs:
        description: "Space-separated dirs containing app.json for production apps (compile order)"
        required: false
        type: string
        default: ""
      test_app_dirs:
        description: "Space-separated dirs containing app.json for test apps"
        required: true
        type: string
      codeunit_range:
        description: "Test codeunit ID range to execute (e.g. 50000..99999). This is the range of your TEST codeunits — production app codeunits aren't run, only published."
        required: true
        type: string
      al_tool_version:
        description: "Linux AL compiler tool version (Microsoft.Dynamics.BusinessCentral.Development.Tools.Linux)"
        required: false
        type: string
        default: "16.2.28.57946"
      runner_image:
        description: "Override the bc-runner image (defaults to the public ghcr.io tag)"
        required: false
        type: string
        default: "ghcr.io/stefanmaron/msdyn365bc.on.linux/bc-runner:latest"
      bc_linux_ref:
        description: "Git ref of StefanMaron/MsDyn365Bc.On.Linux to check out for scripts (master, a tag, or a commit SHA)"
        required: false
        type: string
        default: "master"
      timeout_minutes:
        description: "Job timeout"
        required: false
        type: number
        default: 45

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    env:
      BC_RUNNER_IMAGE: ${{ inputs.runner_image }}
      BC_VERSION: ${{ inputs.bc_version }}
      BC_COUNTRY: ${{ inputs.bc_country }}
      BC_TYPE: ${{ inputs.bc_type }}

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: project

      - name: Checkout MsDyn365Bc.On.Linux
        uses: actions/checkout@v4
        with:
          repository: StefanMaron/MsDyn365Bc.On.Linux
          ref: ${{ inputs.bc_linux_ref }}
          path: bc-linux

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install AL compiler (Linux)
        run: |
          dotnet tool install -g \
            Microsoft.Dynamics.BusinessCentral.Development.Tools.Linux \
            --version "${{ inputs.al_tool_version }}" 2>/dev/null || true
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Download BC artifacts
        run: |
          mkdir -p "artifact-cache/$BC_VERSION"
          bc-linux/scripts/download-artifacts.sh \
            "$BC_TYPE" "$BC_VERSION" "$BC_COUNTRY" \
            "$PWD/artifact-cache/$BC_VERSION"

      - name: Resolve apps to keep in BC database
        env:
          APP_DIRS: ${{ inputs.app_dirs }}
          TEST_APP_DIRS: ${{ inputs.test_app_dirs }}
        run: |
          # Walk the consumer's app.json files to find their immediate
          # dependencies, then resolve the transitive closure against the
          # BC artifact extension set. The resolver always emits the 5
          # baseline application stack apps (System / System Application /
          # Business Foundation / Base Application / Application umbrella);
          # any consumer transitive deps that aren't test framework apps
          # are added to the keep set on top. Test framework apps are
          # deliberately excluded — the entrypoint's republish step does
          # a fresh install of them after NST starts. Result: BC starts
          # with only 5+N apps in Published Application instead of 121,
          # which speeds up the first-boot extension compile phase.
          ARGS=""
          for d in $APP_DIRS $TEST_APP_DIRS; do
            [ -z "$d" ] && continue
            if [ -f "project/$d/app.json" ]; then
              ARGS="$ARGS --app-json project/$d/app.json"
            fi
          done
          KEEP_IDS=$(python3 bc-linux/scripts/resolve-keep-app-ids.py \
            $ARGS \
            --artifact-dir "artifact-cache/$BC_VERSION")
          echo "Resolved keep set: $KEEP_IDS"
          echo "BC_CLEAR_ALL_APPS=selective" >> "$GITHUB_ENV"
          echo "BC_KEEP_APP_IDS=$KEEP_IDS" >> "$GITHUB_ENV"

      - name: Start BC on Linux
        env:
          BC_ARTIFACTS_DIR: ${{ github.workspace }}/artifact-cache/${{ inputs.bc_version }}
        working-directory: bc-linux
        run: |
          # Pre-pull images with retries — mcr.microsoft.com (mssql/server) is
          # occasionally WAF-blocked from GitHub runner IPs, which manifests as
          # "pull access denied ... The request is blocked". A short retry loop
          # works around the transient block.
          for attempt in 1 2 3 4 5; do
            if docker compose pull --quiet; then break; fi
            echo "docker compose pull failed (attempt $attempt/5); retrying in 15s..."
            sleep 15
          done
          docker compose up -d
          for i in $(seq 1 360); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' \
              "$(docker compose ps -q bc)" 2>/dev/null || echo unknown)
            case "$STATUS" in
              healthy)   echo "BC ready after $((i*5))s"; break ;;
              unhealthy) docker compose logs bc | tail -80; exit 1 ;;
            esac
            sleep 5
          done
          [ "$STATUS" = "healthy" ] || { docker compose logs bc | tail -100; exit 1; }

      - name: Stage symbols from BC artifacts
        run: |
          mkdir -p symbols
          ART="artifact-cache/$BC_VERSION"
          find "$ART/platform/ModernDev" -name "System.app" -exec cp {} symbols/ \; 2>/dev/null || true
          find "$ART/app/Extensions" -name "*.app" -exec cp {} symbols/ \; 2>/dev/null || true
          find "$ART/platform" -path "*testframework*" -name "*.app" -exec cp {} symbols/ \; 2>/dev/null || true
          find "$ART/app/Applications" -name "*Test Library*.app" -exec cp {} symbols/ \; 2>/dev/null || true
          find "$ART/app/Applications" -name "*Tests-TestLibraries*.app" -exec cp {} symbols/ \; 2>/dev/null || true
          echo "Staged $(ls symbols/*.app 2>/dev/null | wc -l) symbol files"

      - name: Compile and publish
        env:
          AUTH: "BCRUNNER:Admin123!"
          DEV: "http://localhost:7049"
          APP_DIRS: ${{ inputs.app_dirs }}
          TEST_APP_DIRS: ${{ inputs.test_app_dirs }}
        run: |
          set -e
          publish_app() {
            local app="$1"
            echo ">>> Publishing $app"
            local code
            code=$(curl -s -o /tmp/pub.out -w "%{http_code}" --max-time 180 \
              -u "$AUTH" -X POST \
              -F "file=@${app};type=application/octet-stream" \
              "$DEV/apps?SchemaUpdateMode=forcesync")
            cat /tmp/pub.out; echo
            [ "$code" = "200" ] || [ "$code" = "422" ] || { echo "publish failed: $code"; exit 1; }
          }
          compile_dir() {
            local src="$1"
            [ -f "$src/app.json" ] || { echo "skip $src (no app.json)" >&2; return 0; }
            mkdir -p "$src/.alpackages"
            cp symbols/*.app "$src/.alpackages/" 2>/dev/null || true
            local out
            out="$(pwd)/build/$(basename "$src").app"
            mkdir -p build
            echo ">>> Compiling $src → $out" >&2
            AL compile "/project:$src" "/packagecachepath:$src/.alpackages" "/out:$out" >&2
            echo "$out"
          }
          for d in $APP_DIRS; do
            [ -z "$d" ] && continue
            APP=$(compile_dir "project/$d")
            [ -f "$APP" ] && publish_app "$APP"
          done
          for d in $TEST_APP_DIRS; do
            [ -z "$d" ] && continue
            mkdir -p "project/$d/.alpackages"
            cp build/*.app "project/$d/.alpackages/" 2>/dev/null || true
            APP=$(compile_dir "project/$d")
            [ -f "$APP" ] && publish_app "$APP"
          done

      - name: Run AL tests
        working-directory: bc-linux
        env:
          TEST_APP_DIRS: ${{ inputs.test_app_dirs }}
        run: |
          set -e
          # Iterate only the test apps (we know which ones from TEST_APP_DIRS).
          # Production apps in APP_DIRS are already published but their .app
          # files aren't fed to run-tests.sh because they have no test codeunits.
          for d in $TEST_APP_DIRS; do
            [ -z "$d" ] && continue
            app="../build/$(basename "$d").app"
            [ -f "$app" ] || { echo "skip: $app (not built)"; continue; }
            base=$(basename "$app")
            echo "=== Running tests in $base ==="
            ./scripts/run-tests.sh \
              --app "$app" \
              --codeunit-range "${{ inputs.codeunit_range }}" \
              --timeout 30
          done

      - name: BC logs (on failure)
        if: failure()
        working-directory: bc-linux
        run: |
          echo "=== entrypoint.sh + selective filter output ==="
          docker compose logs bc 2>&1 | grep -E "\[entrypoint\]|Selective|KEEP:|BC_CLEAR_ALL_APPS|BC_KEEP_APP_IDS|test framework|Library Assert|Microsoft_Any|Microsoft_Test Runner" || true
          echo ""
          echo "=== last 500 lines of bc-1 ==="
          docker compose logs bc 2>&1 | tail -500
