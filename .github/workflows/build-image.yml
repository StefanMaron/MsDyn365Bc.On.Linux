name: Build and push bc-runner image

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'extensions/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Canonical image name MUST match what consumers pull. Until 2026-04-07
  # this was `stefanmaron/bc-runner`, while every consumer (including
  # bc-test-from-source.yml's `runner_image` default and downstream projects
  # like bc-copilot-blueprint) pulled `stefanmaron/msdyn365bc.on.linux/bc-runner`.
  # Result: every push to this workflow built and tagged a fresh image that
  # nobody used, while the image people actually pulled stayed frozen for
  # weeks. A multi-day debugging session traced an entrypoint fix that was
  # silently invisible to every CI run because of this mismatch. Don't move
  # this without simultaneously updating bc-test-from-source.yml and any
  # downstream consumer.
  IMAGE_NAME: stefanmaron/msdyn365bc.on.linux/bc-runner

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: src/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
