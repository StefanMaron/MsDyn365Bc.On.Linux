name: Test BC Versions

on:
  workflow_dispatch:
    inputs:
      versions:
        description: 'BC versions to test (comma-separated, e.g. "27.0,27.5,28.0")'
        required: false
        default: '27.0,27.1,27.2,27.3,27.4,27.5'
        type: string
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
    - id: set
      run: |
        VERSIONS='${{ inputs.versions }}'
        if [ -z "$VERSIONS" ]; then
          VERSIONS="27.0,27.1,27.2,27.3,27.4,27.5"
        fi
        JSON=$(echo "$VERSIONS" | python3 -c "import sys,json; print(json.dumps({'bc_version': sys.stdin.read().strip().split(',')}))")
        echo "matrix=$JSON" >> $GITHUB_OUTPUT

  test:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    name: BC ${{ matrix.bc_version }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Build and start BC
      env:
        BC_VERSION: ${{ matrix.bc_version }}
      run: |
        STEP_START=$(date +%s)
        docker compose up -d --build 2>&1 | tail -10

        echo "Waiting for BC to start..."
        for i in $(seq 1 180); do
          if docker compose logs bc 2>&1 | grep -q "Ready for test apps\|Press Enter"; then
            echo "BC v$BC_VERSION ready after $((i*5))s"
            break
          fi
          if ! docker compose ps bc 2>/dev/null | grep -q "Up"; then
            echo "ERROR: BC container died"
            docker compose logs bc 2>&1 | tail -50
            exit 1
          fi
          [ $((i % 12)) -eq 0 ] && echo "  $((i*5))s: $(docker compose logs bc 2>&1 | grep '\[entrypoint\]' | tail -1)"
          sleep 5
        done

        if ! docker compose logs bc 2>&1 | grep -q "Ready for test apps\|Press Enter"; then
          echo "ERROR: BC did not start within 15 minutes"
          docker compose logs bc 2>&1 | tail -100
          exit 1
        fi

        echo "BUILD_DURATION=$(($(date +%s) - STEP_START))" >> $GITHUB_ENV

    - name: Verify endpoints
      env:
        BC_VERSION: ${{ matrix.bc_version }}
      run: |
        AUTH="admin:Admin123!"
        INSTANCE="InstanceName"

        echo "=== Checking endpoints ==="

        # OData
        HTTP=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 -u "$AUTH" \
          "http://localhost:7048/$INSTANCE/ODataV4/Company" 2>/dev/null || echo "000")
        echo "  OData:    $HTTP"
        [ "$HTTP" = "200" ] || { echo "FAIL: OData not responding"; exit 1; }

        # Dev endpoint
        HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 -u "$AUTH" \
          "http://localhost:7049/$INSTANCE/dev/packages" 2>/dev/null || echo "000")
        echo "  Dev:      $HTTP"
        # 400 is expected (no package specified), anything != 000 means it's up
        [ "$HTTP" != "000" ] || { echo "FAIL: Dev endpoint not responding"; exit 1; }

        # API
        HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 -u "$AUTH" \
          "http://localhost:7052/$INSTANCE/api/v2.0/companies" 2>/dev/null || echo "000")
        echo "  API:      $HTTP"

        # Company name
        COMPANY=$(curl -sf --max-time 10 -u "$AUTH" \
          "http://localhost:7048/$INSTANCE/ODataV4/Company" 2>/dev/null | \
          python3 -c "import json,sys; print(json.load(sys.stdin)['value'][0]['Name'])" 2>/dev/null)
        echo "  Company:  $COMPANY"

    - name: Download symbols
      env:
        BC_VERSION: ${{ matrix.bc_version }}
      run: |
        AUTH="admin:Admin123!"
        INSTANCE="InstanceName"
        DEV="http://localhost:7049/$INSTANCE/dev"
        mkdir -p symbols

        echo "=== Downloading symbols ==="
        # System.app (platform symbols — always available)
        curl -sf --max-time 30 -u "$AUTH" \
          "$DEV/packages?publisher=Microsoft&appName=System&appVersion=0.0.0.0" \
          -o symbols/System.app
        echo "  System.app: $(stat -c%s symbols/System.app) bytes"

        # System Application (pre-installed from CRONUS)
        curl -sf --max-time 30 -u "$AUTH" \
          "$DEV/packages?publisher=Microsoft&appName=System%20Application&appVersion=0.0.0.0" \
          -o symbols/SystemApplication.app
        echo "  SystemApplication.app: $(stat -c%s symbols/SystemApplication.app) bytes"

        # Base Application (pre-installed from CRONUS)
        curl -sf --max-time 30 -u "$AUTH" \
          "$DEV/packages?publisher=Microsoft&appName=Base%20Application&appVersion=0.0.0.0" \
          -o symbols/BaseApplication.app
        echo "  BaseApplication.app: $(stat -c%s symbols/BaseApplication.app) bytes"

    - name: Publish sample extension
      env:
        BC_VERSION: ${{ matrix.bc_version }}
      run: |
        AUTH="admin:Admin123!"
        INSTANCE="InstanceName"
        DEV="http://localhost:7049/$INSTANCE/dev/apps?SchemaUpdateMode=forcesync"

        # Create a minimal test extension with a test codeunit
        mkdir -p /tmp/testapp
        cat > /tmp/testapp/app.json << 'APPJSON'
        {
          "id": "aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa",
          "name": "Smoke Test",
          "publisher": "BCLinux",
          "version": "1.0.0.0",
          "runtime": "14.0",
          "target": "OnPrem",
          "dependencies": [],
          "idRanges": [{ "from": 70000, "to": 70001 }]
        }
        APPJSON

        cat > /tmp/testapp/SmokeTest.Codeunit.al << 'ALCODE'
        codeunit 70000 "Smoke Test"
        {
            Subtype = Test;

            [Test]
            procedure TestBCOnLinuxWorks()
            begin
                if Today() < 20200101D then
                    Error('Date sanity check failed');
            end;
        }
        ALCODE

        # Download System.app as symbol
        mkdir -p /tmp/testapp/.alpackages
        curl -sf --max-time 30 -u "$AUTH" \
          "http://localhost:7049/$INSTANCE/dev/packages?publisher=Microsoft&appName=System&appVersion=0.0.0.0" \
          -o /tmp/testapp/.alpackages/System.app

        # Compile
        echo "Compiling sample test extension..."
        AL compile \
          "/project:/tmp/testapp" \
          "/packagecachepath:/tmp/testapp/.alpackages" \
          "/out:/tmp/testapp/SmokeTest.app" \
          || { echo "FAIL: Sample extension compilation failed"; exit 1; }

        # Publish
        echo "Publishing sample test extension..."
        HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 \
          -u "$AUTH" -X POST \
          -F "file=@/tmp/testapp/SmokeTest.app;type=application/octet-stream" "$DEV")
        echo "  Publish: HTTP $HTTP"
        [ "$HTTP" = "200" ] || { echo "FAIL: Publish failed (HTTP $HTTP)"; exit 1; }

    - name: Publish test framework
      env:
        BC_VERSION: ${{ matrix.bc_version }}
      run: |
        AUTH="admin:Admin123!"
        INSTANCE="InstanceName"
        DEV="http://localhost:7049/$INSTANCE/dev/apps?SchemaUpdateMode=forcesync"

        # The MS Test Runner (codeunits 130450-130456) may not be pre-installed.
        # Download and publish it from platform artifacts inside the container.
        echo "Publishing MS Test Runner from platform artifacts..."
        TR_APP=$(docker compose exec bc find /bc/artifacts/platform -ipath "*testframework/TestRunner*/*.app" 2>/dev/null | head -1 | tr -d '\r')
        if [ -n "$TR_APP" ]; then
          docker compose exec bc curl -s -o /dev/null -w "  Test Runner (MS): HTTP %{http_code}\n" --max-time 60 \
            -u "$AUTH" -X POST \
            -F "file=@$TR_APP;type=application/octet-stream" "$DEV" 2>/dev/null
        else
          echo "  Test Runner not found in artifacts — skipping"
        fi

        # Re-publish our TestRunner Extension (depends on MS Test Runner)
        echo "Publishing TestRunner Extension..."
        docker compose exec bc bash -c '
          [ -f /bc/testrunner/TestRunner.app ] && curl -s -o /dev/null -w "  TestRunner Extension: HTTP %{http_code}\n" --max-time 30 \
            -u "admin:Admin123!" -X POST \
            -F "file=@/bc/testrunner/TestRunner.app;type=application/octet-stream" \
            "http://localhost:7049/InstanceName/dev/apps?SchemaUpdateMode=synchronize"
        ' 2>/dev/null || echo "  TestRunner Extension: skipped"

    - name: Run sample test
      env:
        BC_VERSION: ${{ matrix.bc_version }}
      run: |
        AUTH="admin:Admin123!"
        INSTANCE="InstanceName"
        ODATA="http://localhost:7048/$INSTANCE"

        # Get company ID
        COMPANY_ID=$(curl -sf --max-time 10 -u "$AUTH" \
          "$ODATA/ODataV4/Company" | \
          python3 -c "import sys,json; print(json.load(sys.stdin)['value'][0]['Id'])")
        API="http://localhost:7052/$INSTANCE/api/custom/automation/v1.0/companies($COMPANY_ID)/codeunitRunRequests"

        # Verify TestRunner API is available
        HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 -u "$AUTH" "$API" 2>/dev/null || true)
        [ "$HTTP" = "200" ] || { echo "FAIL: TestRunner API not available (HTTP $HTTP)"; exit 1; }

        # Run the smoke test codeunit
        echo "Running smoke test codeunit 70000..."
        RESP=$(curl -sf --max-time 15 -u "$AUTH" -X POST \
          -H "Content-Type: application/json" -d '{"codeunitId": 70000}' \
          "$API")
        ID=$(echo "$RESP" | python3 -c "import json,sys; print(json.load(sys.stdin).get('Id',''))")

        curl -sf -o /dev/null --max-time 120 -u "$AUTH" -X POST \
          -H "Content-Type: application/json" \
          "$API($ID)/Microsoft.NAV.runCodeunit" 2>/dev/null || true

        RESULT=$(curl -sf --max-time 10 -u "$AUTH" "$API($ID)" | \
          python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('LastResult','Unknown'))")
        echo "Test result: $RESULT"
        [ "$RESULT" = "Success" ] || { echo "FAIL: Test returned $RESULT"; exit 1; }

    - name: Summary
      if: always()
      env:
        BC_VERSION: ${{ matrix.bc_version }}
      run: |
        echo "=== BC v$BC_VERSION ==="
        echo "Build + start: ${BUILD_DURATION:-n/a}s"
        docker compose logs bc 2>&1 | grep "\[entrypoint\]" | tail -5
