name: Test BC Versions

on:
  workflow_dispatch:
    inputs:
      versions:
        description: 'BC versions to test (comma-separated, e.g. "27.0,27.5,28.0")'
        required: false
        default: '27.0,27.1,27.2,27.3,27.4,27.5'
        type: string
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
    - id: set
      run: |
        VERSIONS='${{ inputs.versions }}'
        if [ -z "$VERSIONS" ]; then
          VERSIONS="27.0,27.1,27.2,27.3,27.4,27.5"
        fi
        JSON=$(echo "$VERSIONS" | python3 -c "import sys,json; print(json.dumps({'bc_version': sys.stdin.read().strip().split(',')}))")
        echo "matrix=$JSON" >> $GITHUB_OUTPUT

  test:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    name: BC ${{ matrix.bc_version }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET SDK and AL compiler
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install AL compiler
      run: |
        dotnet tool install -g Microsoft.Dynamics.BusinessCentral.Development.Tools.Linux \
          --version 16.2.28.57946 2>/dev/null || true
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Build and start BC
      env:
        BC_VERSION: ${{ matrix.bc_version }}
      run: |
        STEP_START=$(date +%s)
        docker compose up -d --build 2>&1 | tail -10

        echo "Waiting for BC to be healthy..."
        for i in $(seq 1 180); do
          STATUS=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q bc) 2>/dev/null || echo "unknown")
          case "$STATUS" in
            healthy)
              echo "BC v$BC_VERSION healthy after $((i*5))s"
              break
              ;;
            unhealthy)
              echo "ERROR: BC container unhealthy"
              docker compose logs bc 2>&1 | tail -50
              exit 1
              ;;
          esac
          if ! docker compose ps bc 2>/dev/null | grep -q "Up"; then
            echo "ERROR: BC container died"
            docker compose logs bc 2>&1 | tail -50
            exit 1
          fi
          [ $((i % 12)) -eq 0 ] && echo "  $((i*5))s: $(docker compose logs bc 2>&1 | grep '\[entrypoint\]' | tail -1)"
          sleep 5
        done

        if [ "$STATUS" != "healthy" ]; then
          echo "ERROR: BC did not become healthy within 15 minutes"
          docker compose logs bc 2>&1 | tail -100
          exit 1
        fi

        echo "BUILD_DURATION=$(($(date +%s) - STEP_START))" >> $GITHUB_ENV

    - name: Verify endpoints
      env:
        BC_VERSION: ${{ matrix.bc_version }}
      run: |
        AUTH="admin:Admin123!"
        INSTANCE="BC"

        echo "=== Checking endpoints ==="

        # OData
        HTTP=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 -u "$AUTH" \
          "http://localhost:7048/$INSTANCE/ODataV4/Company" 2>/dev/null || echo "000")
        echo "  OData:    $HTTP"
        [ "$HTTP" = "200" ] || { echo "FAIL: OData not responding"; exit 1; }

        # Dev endpoint
        HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 -u "$AUTH" \
          "http://localhost:7049/$INSTANCE/dev/packages" 2>/dev/null || echo "000")
        echo "  Dev:      $HTTP"
        # 400 is expected (no package specified), anything != 000 means it's up
        [ "$HTTP" != "000" ] || { echo "FAIL: Dev endpoint not responding"; exit 1; }

        # API
        HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 -u "$AUTH" \
          "http://localhost:7052/$INSTANCE/api/v2.0/companies" 2>/dev/null || echo "000")
        echo "  API:      $HTTP"

        # Company name
        COMPANY=$(curl -sf --max-time 10 -u "$AUTH" \
          "http://localhost:7048/$INSTANCE/ODataV4/Company" 2>/dev/null | \
          python3 -c "import json,sys; print(json.load(sys.stdin)['value'][0]['Name'])" 2>/dev/null)
        echo "  Company:  $COMPANY"

    - name: Download symbols
      env:
        BC_VERSION: ${{ matrix.bc_version }}
      run: |
        AUTH="admin:Admin123!"
        INSTANCE="BC"
        DEV="http://localhost:7049/$INSTANCE/dev"
        mkdir -p symbols

        echo "=== Downloading symbols ==="
        # System.app (platform symbols — always available)
        curl -sf --max-time 30 -u "$AUTH" \
          "$DEV/packages?publisher=Microsoft&appName=System&appVersion=0.0.0.0" \
          -o symbols/System.app
        echo "  System.app: $(stat -c%s symbols/System.app) bytes"

        # System Application (pre-installed from CRONUS)
        curl -sf --max-time 30 -u "$AUTH" \
          "$DEV/packages?publisher=Microsoft&appName=System%20Application&appVersion=0.0.0.0" \
          -o symbols/SystemApplication.app
        echo "  SystemApplication.app: $(stat -c%s symbols/SystemApplication.app) bytes"

        # Base Application (pre-installed from CRONUS)
        curl -sf --max-time 30 -u "$AUTH" \
          "$DEV/packages?publisher=Microsoft&appName=Base%20Application&appVersion=0.0.0.0" \
          -o symbols/BaseApplication.app
        echo "  BaseApplication.app: $(stat -c%s symbols/BaseApplication.app) bytes"

    - name: Publish and run smoke test
      env:
        BC_VERSION: ${{ matrix.bc_version }}
      run: |
        AUTH="admin:Admin123!"

        # Wait for test framework to be published by entrypoint
        echo "Waiting for test framework..."
        for i in $(seq 1 36); do
          # Check if Test Runner app is installed (page 130455 requires it)
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 -u "$AUTH" \
            "http://localhost:7049/apps" -X POST \
            -F "file=@/dev/null;type=application/octet-stream" 2>/dev/null || echo "000")
          [ "$HTTP" != "000" ] && break
          sleep 5
        done

        # Publish test framework from platform artifacts (if not done by entrypoint)
        ARTIFACTS_DIR=$(docker exec $(docker compose ps -q bc) \
          find /bc/artifacts -type d -name testframework 2>/dev/null | head -1)
        if [ -n "$ARTIFACTS_DIR" ]; then
          echo "Publishing test framework from $ARTIFACTS_DIR..."
          for app in $(docker exec $(docker compose ps -q bc) \
            find "$ARTIFACTS_DIR" -name "*.app" -not -path "*/Internal/*" 2>/dev/null); do
            docker exec $(docker compose ps -q bc) \
              curl -s -o /dev/null -w "  %{http_code} $(basename $app)\n" --max-time 60 \
                -u "$AUTH" -X POST \
                -F "file=@$app;type=application/octet-stream" \
                "http://localhost:7049/apps?SchemaUpdateMode=forcesync" 2>/dev/null || true
          done
        fi

        # Create and compile a smoke test extension
        mkdir -p /tmp/testapp/.alpackages
        cat > /tmp/testapp/app.json << 'APPJSON'
        {
          "id": "aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee",
          "name": "Smoke Test",
          "publisher": "BCLinux",
          "version": "1.0.0.0",
          "runtime": "14.0",
          "target": "OnPrem",
          "dependencies": [
            { "id": "dd0be2ea-f733-4d65-bb34-a28f4624fb14",
              "name": "Library Assert", "publisher": "Microsoft", "version": "1.0.0.0" },
            { "id": "23de40a6-dfe8-4f80-80db-d70f83ce8caf",
              "name": "Test Runner", "publisher": "Microsoft", "version": "1.0.0.0" }
          ],
          "idRanges": [{ "from": 70000, "to": 70001 }]
        }
        APPJSON

        cat > /tmp/testapp/SmokeTest.Codeunit.al << 'ALCODE'
        codeunit 70000 "BC Linux Smoke Test"
        {
            Subtype = Test;
            TestPermissions = Disabled;

            [Test]
            procedure TestBCOnLinuxWorks()
            var
                Assert: Codeunit "Library Assert";
            begin
                Assert.IsTrue(Today() > 20200101D, 'Date sanity check');
                Assert.AreEqual(42, 42, 'Basic integer equality');
                Assert.AreEqual('Hello', 'Hello', 'Basic string equality');
            end;
        }
        ALCODE

        # Download symbols
        curl -sf --max-time 30 -u "$AUTH" \
          "http://localhost:7049/packages?publisher=Microsoft&appName=System&appVersion=0.0.0.0" \
          -o /tmp/testapp/.alpackages/System.app || true
        # Also get the test framework symbols we need
        for sym in "Library Assert" "Test Runner" "System Application"; do
          curl -sf --max-time 30 -u "$AUTH" \
            "http://localhost:7049/packages?publisher=Microsoft&appName=$(echo $sym | sed 's/ /%20/g')&appVersion=0.0.0.0" \
            -o "/tmp/testapp/.alpackages/${sym}.app" 2>/dev/null || true
        done

        # Compile
        echo "Compiling smoke test..."
        AL compile \
          "/project:/tmp/testapp" \
          "/packagecachepath:/tmp/testapp/.alpackages" \
          "/out:/tmp/testapp/SmokeTest.app" \
          || { echo "FAIL: Compilation failed"; exit 1; }

        # Run tests using the test runner script
        echo "Running tests..."
        ./scripts/run-tests.sh \
          --app /tmp/testapp/SmokeTest.app \
          --codeunit-range 70000 \
          --timeout 5

    - name: Summary
      if: always()
      env:
        BC_VERSION: ${{ matrix.bc_version }}
      run: |
        echo "=== BC v$BC_VERSION ==="
        echo "Build + start: ${BUILD_DURATION:-n/a}s"
        docker compose logs bc 2>&1 | grep "\[entrypoint\]" | tail -5
